name: Download Self-Hosted Fonts

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:
  # Also run automatically if download_fonts.py changes
  push:
    paths:
      - 'pipeline/download_fonts.py'

jobs:
  download-fonts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download fonts
        run: python pipeline/download_fonts.py

      - name: Commit fonts to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/fonts/
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update self-hosted fonts [skip ci]"
          git push
