name: Weekly Digest

on:
#  schedule:
#    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      week:
        description: 'ISO week number (leave empty for current week)'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Resolve week number
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            echo "WEEK=${{ github.event.inputs.week }}" >> $GITHUB_ENV
          else
            echo "WEEK=$(date -u +%V)" >> $GITHUB_ENV
          fi

      - name: Fetch RSS articles (weekly window)
        run: python pipeline/fetch_rss.py --mode weekly --week $WEEK

      - name: Score articles
        run: python pipeline/score.py --mode weekly --week $WEEK

      - name: Translate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/translate.py --mode weekly --week $WEEK --langs ru,en

      - name: Render RU
        run: python pipeline/render.py --mode weekly --week $WEEK --lang ru

      - name: Render EN
        run: python pipeline/render.py --mode weekly --week $WEEK --lang en

#      - name: Render HE
#        run: python pipeline/render.py --mode weekly --week $WEEK --lang he

      - name: Copy to archive
        run: |
          WPAD=$(printf "W%02d" $WEEK)
          mkdir -p docs/archive/$WPAD
          cp docs/index.html    docs/archive/$WPAD/ru.html 2>/dev/null || true
          cp docs/en/index.html docs/archive/$WPAD/en.html 2>/dev/null || true
          cp docs/he/index.html docs/archive/$WPAD/he.html 2>/dev/null || true
          mkdir -p data/archive
          cp data/${WPAD}_translated.json data/archive/ 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "Weekly digest W$WEEK"
          git push
